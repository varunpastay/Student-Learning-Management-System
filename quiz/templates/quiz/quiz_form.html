{% extends 'base.html' %}
{% block title %}{{ action }} Quiz — SLMS{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4">
      <h5 class="fw-bold mb-4"><i class="bi bi-patch-question me-2 text-primary"></i>{{ action }} Quiz</h5>
      <form method="post">{% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:12px">{{ field.label }}</label>
          {{ field }}{% if field.errors %}<div class="text-danger mt-1" style="font-size:12px">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Create Quiz & Add Questions →</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
