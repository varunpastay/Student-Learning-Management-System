{% extends 'base.html' %}
{% block title %}New Post — Forum{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <a href="{% url 'forum:list' course.slug %}" class="btn btn-sm btn-outline-secondary mb-3"><i class="bi bi-arrow-left me-1"></i>Back</a>
    <div class="card p-4">
      <h5 class="fw-bold mb-4"><i class="bi bi-pencil me-2 text-primary"></i>New Discussion Post</h5>
      <p class="text-muted mb-4" style="font-size:13px">Course: <strong>{{ course.title }}</strong></p>
      <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label fw-semibold" style="font-size:12px">Title *</label>
        <input type="text" name="title" class="form-control" placeholder="What's your question or topic?" required></div>
        <div class="mb-3"><label class="form-label fw-semibold" style="font-size:12px">Details *</label>
        <textarea name="body" class="form-control" rows="6" placeholder="Describe your question in detail..." required></textarea></div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-send me-2"></i>Post Discussion</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
