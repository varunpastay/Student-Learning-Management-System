<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;margin:0;padding:20px}
.container{max-width:600px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.header{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:32px;text-align:center}
.header h1{color:#fff;margin:0;font-size:24px}
.header p{color:rgba(255,255,255,.8);margin:8px 0 0;font-size:14px}
.body{padding:32px}
.body h2{font-size:20px;color:#1e293b;margin-bottom:8px}
.body p{color:#475569;line-height:1.6;font-size:14px}
.btn{display:inline-block;background:#4f46e5;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;margin:16px 0}
.info-box{background:#f8fafc;border-radius:8px;padding:16px;margin:16px 0;border-left:4px solid #4f46e5}
.info-box p{margin:4px 0;font-size:13px;color:#475569}
.footer{background:#f8fafc;padding:20px 32px;text-align:center;font-size:12px;color:#94a3b8;border-top:1px solid #e2e8f0}
</style></head>
<body>
<div class="container">
  <div class="header">
    <h1>📚 SLMS</h1>
    <p>Student Learning Management System</p>
  </div>
  <div class="body">{% block content %}{% endblock %}</div>
  <div class="footer">© SLMS · You received this because you are registered on SLMS.<br>
  <a href="#" style="color:#94a3b8">Unsubscribe</a></div>
</div>
</body></html>
